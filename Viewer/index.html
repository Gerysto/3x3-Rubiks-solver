<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template</title>
    <style>
        html,body {
            height:100%;
        }
        #c {
            margin-left: 5%;
            margin-right: 5%;

            margin-top: 20px;
            margin-bottom: 20px;
            border: 2px solid black;
            height:40%;
            width:90%;
            touch-action: none;
        }
        *{
            font-family: 'Courier New', Courier, monospace;
        }
        .container{
            margin-top: 20px;
            margin-bottom: 20px;
        }
    </style>
    <script>
        async function mystart() {
            console.log("Hello world!");
            start();
        }
    </script>
    <script src="libs/J3DIMath.js"></script>
    <script type="module" src="dist/main.js"></script>
</head>
<body>
    
    <div class="container" style="display:flex; flex-direction: column;">
        <input  id="scramble_field" placeholder="e.g. R U R' U'">
        <button id="send_scramble">Execute Sequence</button>
        <button id="random_scramble">Random Scramble</button>
    </div>

    <div class="container" style="display: flex; flex-direction: column;">
        <div style="display: flex;">
            <label> TurnSpeed:</label>
            <label id="turn_speed_label" style="margin-left:5px; margin-right:5px">
        </div>
        <input  id="turn_speed" type="range" min="0.2" max="20" step="0.2" value="5.0">
    </div>
    <div class="container" style="display: flex;">
        <button id="solve" style="width:100%">Solve!</button>
        <button id="default_orientation" style="width:100%">Return to default orientation</button>
    </div>
    <canvas id="c"></canvas>
</body>
</html>
