<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template</title>
    <style>
        #c {
            border: 2px solid black;
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="libs/cube_lib.js"></script>
    <script src="src/shader-utils.js"></script>
    <script src="src/model_parser.js"></script>
    <script src="libs/J3DIMath.js"></script>
    <script src="src/render_logic.js"></script>
    <script src="src/index.js"></script>
    <script>
        async function run() {
            const Module = await createModule();
            const obj = new Module.Cube();

            const send_button = document.getElementById("send_scramble");
            send_button.addEventListener('click', () => {
                scramble_field = document.getElementById("scramble_field");
                obj.execute_sequence_in_notation(scramble_field.value);
                obj.print_state();
            })
        }
        run();
    </script>
</head>
<body onload="start()">
    <input id = "scramble_field"></input>
    <button id="send_scramble">send scramble!</button>
    <canvas id="c"></canvas>
</body>
</html>
