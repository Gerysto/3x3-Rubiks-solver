<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Rubik's Cube</title>
    <style>
        html,body {
            height:100%;
        }
        #c {
            margin-left: 5%;
            margin-right: 5%;

            margin-top: 20px;
            margin-bottom: 20px;
            border: 2px solid black;
            height:40%;
            width:90%;
            touch-action: none;
        }
        *{
            font-family: 'Courier New', Courier, monospace;
        }
        .container{
            margin-top: 20px;
            margin-bottom: 20px;
        }
        
        #loader-spinner {
        width:120px;
        height:120px;
        animation: rotation 2s linear infinite;
        }

        .square1 {
        width: 30px;
        height: 30px;
        border: 1px solid black;
        border-radius: 6px;
        margin: 4px;
        animation: colors1 0.8s linear infinite;
        }
        .square2 {
        width: 30px;
        height: 30px;
        border: 1px solid black;
        border-radius: 6px;
        margin: 4px;
        animation: colors2 0.8s linear infinite;
        }

        #scramble_field {
            margin-bottom: 2px;
        }
        #scramble_field.invalid {
            border: 2px solid #AF0000;
            border-radius:0.4em;
            outline: none;
        }
        
        #scramble_field.valid {
            border: 2px solid black;
            border-radius:0.4em;
            outline: none;
        }


        @keyframes colors1 {
            0%   {background-color: yellow;}
            40%  {background-color: yellow;}
            50%  {background-color: white ;}
            90%  {background-color: white;}
            100% {background-color: yellow;}
        }

        @keyframes colors2 {
            0%   {background-color: white;}
            40%  {background-color: white;}
            50%  {background-color: yellow ;}
            90%  {background-color: yellow;}
            100% {background-color: white;}
        }

        @keyframes rotation {
            0%    {transform: rotate(0deg);}
            100%  {transform: rotate(90deg);}
        }

    </style>
    <script src="libs/J3DIMath.js"></script>
    <script type="module" src="dist/bundle.js"></script>
</head>
<body>
    
    <div class="container" style="display:flex; flex-direction: column;">
        <input  class="valid" id="scramble_field" placeholder="e.g. R U R' U'">
        <button id="send_scramble">Execute Sequence</button>
        <button id="random_scramble">Random Scramble</button>
    </div>

    <div class="container" style="display: flex; flex-direction: column;">
        <div style="display: flex;">
            <label> TurnSpeed:</label>
            <label id="turn_speed_label" style="margin-left:5px; margin-right:5px">
        </div>
        <input  id="turn_speed" type="range" min="0.2" max="20" step="0.2" value="5.0">
    </div>
    <div class="container" style="display: flex;">
        <button id="solve" style="width:100%">Solve!</button>
        <button id="default_orientation" style="width:100%">Return to default orientation</button>
    </div>
    <div id="loader" style="margin-top: 10em">
        <div id="loader-spinner" style="margin:auto">
            <div style="display:flex; flex:horizontal">
            <div class="square1"></div>
            <div class="square2"></div>
            <div class="square1"></div>
            </div>
            <div style="display:flex; flex:horizontal">
            <div class="square2"></div>
            <div class="square1"></div>
            <div class="square2"></div>
            </div>
            <div style="display:flex; flex:horizontal">
            <div class="square1"></div>
            <div class="square2"></div>
            <div class="square1"></div>
            </div>
        </div>
    </div>
    <canvas id="c" style="display:none"></canvas>
</body>
</html>
