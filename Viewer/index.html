<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Rubik's Cube</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            margin: 0;
        }
        .app {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        #c {
            width: 100%;
            height: auto;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            background: white;
            touch-action: none;
        }
        .container {
            background: white;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.10);
        }
        .flex-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .flex-row {
            display: flex;
            gap: 10px;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #1e4fd1;
        }

        button:disabled {
            background: #888;
            pointer-events: none;
        }
        button#solve {
            padding-right:2em;
        }

        #cog-img.animated {
            animation: full-rotation 4s linear infinite
        }

        button.secondary {
            background: #e5e7eb;
            color: #111;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        label {
            font-weight:900;
            font-size: 14px;
            color: #444;
        }

        #loader{
            display:flex;
            align-items: center;
            justify-content: center;
            height: 400px;
        }
        #loader-spinner {
            width:120px;
            height:120px;
            animation: rotation 10s linear infinite;
        }

        .square1 {
            width: 30px;
            height: 30px;
            border: 1px solid black;
            border-radius: 6px;
            margin: 4px;
            animation: colors1 0.8s linear infinite;
        }
        .square2 {
            width: 30px;
            height: 30px;
            border: 1px solid black;
            border-radius: 6px;
            margin: 4px;
            animation: colors2 0.8s linear infinite;
        }
        .full-width {
            width: 100%;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        #scramble_field {
            margin-bottom: 2px;
        }
        #scramble_field.invalid {
            border: 2px solid #AF0000;
            border-radius:0.4em;
            outline: none;
        }
        
        #scramble_field.valid {
            border: 2px solid black;
            border-radius:0.4em;
            outline: none;
        }


        @keyframes colors1 {
            0%   {background-color: yellow;}
            40%  {background-color: yellow;}
            50%  {background-color: white ;}
            90%  {background-color: white;}
            100% {background-color: yellow;}
        }

        @keyframes colors2 {
            0%   {background-color: white;}
            40%  {background-color: white;}
            50%  {background-color: yellow ;}
            90%  {background-color: yellow;}
            100% {background-color: white;}
        }

        @keyframes rotation {
            0%    {transform: rotate(0deg);}
            100%  {transform: rotate(90deg);}
        }
        @keyframes full-rotation {
            0%    {transform: rotate(0deg);}
            100%  {transform: rotate(360deg);}
        }

    </style>
    <script src="libs/J3DIMath.js"></script>
    <script type="module" src="dist/bundle.js"></script>
</head>
<body>
    <div class="app">
        <div class="container flex-col">
            <label for="scramble_field">Move sequence:</label>
            <input class="valid" id="scramble_field" placeholder="R U R' U' R' F R2 U' R' U' R U R' F'">
            <button id="send_scramble">Execute Sequence</button>
            <button id="random_scramble" class="secondary">Random Scramble</button>
        </div>

        <div class="container flex-col">
            <div class="flex-row">
                <label for="turn_speed"> Turn speed:</label>
                <label for="turn_speed" id="turn_speed_label"></label>
            </div>
            <input  id="turn_speed" type="range" min="0.2" max="20" step="0.2" value="5.0">
        </div>

        <div class="container flex-row">
            <button id="solve" class="primary full-width flex-row">
                <img id="cog-img" style="height:2em" src="assets/images/cog.png"></img>
                <div class="flex-col" style="justify-content:center; width:100%">
                    <span style="justify-content:center;">Solve!</span>
                </div>
            </button>
            <button id="default_orientation" class="secondary full-width">Return to default orientation</button>
        </div>
        
        <div id="loader">
            <div id="loader-spinner">
                <div style="display:flex; flex:horizontal">
                    <div class="square1"></div>
                    <div class="square2"></div>
                    <div class="square1"></div>
                </div>
                <div style="display:flex; flex:horizontal">
                    <div class="square2"></div>
                    <div class="square1"></div>
                    <div class="square2"></div>
                </div>
                <div style="display:flex; flex:horizontal">
                    <div class="square1"></div>
                    <div class="square2"></div>
                    <div class="square1"></div>
                </div>
            </div>
        </div>
        <canvas id="c" style="display:none"></canvas>
    </div>
</body>
</html>
