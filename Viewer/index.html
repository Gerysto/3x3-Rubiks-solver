<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template</title>
    <style>
        #c {
            border: 2px solid black;
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        async function mystart() {
            console.log("Hello world!");
            start();
        }
    </script>
    <script src="libs/J3DIMath.js"></script>
    <script type="module" src="dist/main.js"></script>
</head>
<body>
    <input  id="scramble_field" placeholder="e.g. R U R' U'"></input>
    <button id="send_scramble">send scramble!</button>
    <button id="random_scramble">Random scramble :D</button>
    <button id="solve">Solve!</button>
    <canvas id="c"></canvas>
    <input  id="turn_speed" type="range" min="0.2" max="20" step="0.2" value="5.0">
    <button id="default_orientation">Return to default orientation</button>
</body>
</html>
